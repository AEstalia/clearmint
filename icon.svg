  <line x1="96" y1="80" x2="116" y2="68" stroke="#009e78" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="72" y2="86" stroke="#009e78" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="120" y2="86" stroke="#009e78" stroke-width="1.8" stroke-linecap="round"/>
